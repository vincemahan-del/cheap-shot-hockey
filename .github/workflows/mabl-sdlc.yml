name: mabl SDLC gate

# Strict sequential gates. Each stage's `needs:` gates the next — any
# failure skips all downstream stages, so a red PR gate blocks merge
# (via branch protection) and a red main-push stage skips prod smoke.
#
#   PR push   → lint → unit → build → t1-smoke-preview (newman CLI)
#               → mabl-smoke (CSH-SMOKE-PR, Preview)
#
#   Main push → lint → unit → build → t1-smoke-prod (newman CLI)
#               → post-deploy-smoke (CSH-SMOKE-POSTDEPLOY, Prod)
#
# T1 smokes are CLI (newman vs Postman collection) — fast, pre-dates
# mabl cloud spin-up, catches basic API failures before burning cloud
# minutes. T1 runs both as a pre-push hook (developer's laptop) AND
# here in CI so the check status is visible on the PR and required by
# branch protection.
#
# Plan architecture (mabl workspace):
#   - CSH-SMOKE-PR           : labels type-smk,exec-pr,...  env=Preview only
#   - CSH-SMOKE-POSTDEPLOY   : labels type-smk,exec-postdeploy,...  env=Prod only
#
# Required secrets: MABL_API_TOKEN, MABL_WORKSPACE_ID, MABL_APPLICATION_ID,
# MABL_ENV_PREVIEW_ID, MABL_ENV_PROD_ID.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PRODUCTION_URL: https://cheap-shot-hockey.vercel.app

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Stage 1: code quality (lint → unit → build)
  # ─────────────────────────────────────────────────────────────────

  lint:
    name: lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit:
    name: unit tests + coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: build (next)
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: T1 CLI smoke (newman vs Postman collection)
  #   - PR:   hits Vercel Preview URL
  #   - Main: hits Vercel Prod URL (after Vercel reflects the commit)
  # ─────────────────────────────────────────────────────────────────

  t1-smoke-preview:
    name: T1 — newman smoke (Preview)
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: wait for Vercel Preview to be ready
        run: |
          url="https://cheap-shot-hockey-git-${{ github.head_ref }}.vercel.app"
          echo "Polling $url/api/health ..."
          for i in $(seq 1 30); do
            if curl -fsS -m 5 "$url/api/health" >/dev/null 2>&1; then
              echo "Preview ready at $url"
              exit 0
            fi
            sleep 10
          done
          echo "Preview never came up at $url" >&2
          exit 1
      - name: run newman T1 smoke
        run: |
          url="https://cheap-shot-hockey-git-${{ github.head_ref }}.vercel.app/api"
          npx --yes newman run mabl/postman/csh-api-smoke.postman_collection.json \
            --env-var "baseUrl=$url" \
            --reporters cli \
            --color on \
            --timeout-request 10000

  t1-smoke-prod:
    name: T1 — newman smoke (Prod)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: wait for Vercel Prod to reflect new commit
        run: |
          short="${GITHUB_SHA:0:7}"
          for i in $(seq 1 30); do
            live=$(curl -fsS "${{ env.PRODUCTION_URL }}/api/build-info" | jq -r '.commit' | cut -c1-7)
            echo "live=$live expected=$short"
            [ "$live" = "$short" ] && exit 0
            sleep 10
          done
          echo "Prod never reflected new commit" >&2
          exit 1
      - name: run newman T1 smoke
        run: |
          npx --yes newman run mabl/postman/csh-api-smoke.postman_collection.json \
            --env-var "baseUrl=${{ env.PRODUCTION_URL }}/api" \
            --reporters cli \
            --color on \
            --timeout-request 10000

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: mabl cloud gate — gated on T1 newman green
  #   - PR:   CSH-SMOKE-PR against Preview
  #   - Main: CSH-SMOKE-POSTDEPLOY against Prod
  # ─────────────────────────────────────────────────────────────────

  mabl-smoke:
    name: mabl — CSH-SMOKE-PR (Preview)
    needs: t1-smoke-preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      MABL_API_TOKEN: ${{ secrets.MABL_API_TOKEN }}
      MABL_WORKSPACE_ID: ${{ secrets.MABL_WORKSPACE_ID }}
      MABL_APPLICATION_ID: ${{ secrets.MABL_APPLICATION_ID }}
      MABL_ENV_PREVIEW_ID: ${{ secrets.MABL_ENV_PREVIEW_ID }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y jq
      - name: trigger CSH-SMOKE-PR against Preview
        run: |
          chmod +x scripts/mabl-deployment.sh
          ./scripts/mabl-deployment.sh \
            --environment "$MABL_ENV_PREVIEW_ID" \
            --application "$MABL_APPLICATION_ID" \
            --labels type-smk,exec-pr \
            --url "https://cheap-shot-hockey-git-${{ github.head_ref }}.vercel.app" \
            --commit "${{ github.sha }}" \
            --branch "${{ github.head_ref }}" \
            --wait

  post-deploy-smoke:
    name: mabl — CSH-SMOKE-POSTDEPLOY (Prod)
    needs: t1-smoke-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      MABL_API_TOKEN: ${{ secrets.MABL_API_TOKEN }}
      MABL_APPLICATION_ID: ${{ secrets.MABL_APPLICATION_ID }}
      MABL_ENV_PROD_ID: ${{ secrets.MABL_ENV_PROD_ID }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y jq
      - name: trigger CSH-SMOKE-POSTDEPLOY against Prod
        run: |
          chmod +x scripts/mabl-deployment.sh
          ./scripts/mabl-deployment.sh \
            --environment "$MABL_ENV_PROD_ID" \
            --application "$MABL_APPLICATION_ID" \
            --labels type-smk,exec-postdeploy \
            --url "${{ env.PRODUCTION_URL }}" \
            --commit "${{ github.sha }}" \
            --branch main \
            --wait

  # NOTE: the regression gate is intentionally not wired yet.
  # Re-add a `mabl-regression` job dispatching `type-rt,exec-nightly`
  # against Prod once the CSH-REGRESSION plan exists in mabl. Until
  # then, dispatching that label set wastes ~60s per main push with
  # zero matching plans.
