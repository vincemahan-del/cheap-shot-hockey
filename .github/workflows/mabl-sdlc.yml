name: mabl SDLC gate

# Slim full-SDLC pipeline. One mabl dispatch per trigger (was 4):
#
#   PR push    → lint → unit → build → mabl-smoke (Preview)
#   Main push  → lint → unit → build → post-deploy-smoke (Prod, after Vercel reflect)
#
# Why just one dispatch per trigger: the CSH-SMOKE plan has both
# type-smk and type-ui labels plus API + UI stages, so one dispatch
# fires Stage 1 (API) and Stage 2 (UI) on both Preview and Prod.
# Extra dispatches create duplicate plan runs without extra coverage.
#
# Required secrets: MABL_API_TOKEN, MABL_WORKSPACE_ID, MABL_APPLICATION_ID,
# MABL_ENV_PREVIEW_ID, MABL_ENV_PROD_ID.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PRODUCTION_URL: https://cheap-shot-hockey.vercel.app

jobs:
  lint:
    name: lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit:
    name: unit tests + coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: build (next)
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build

  mabl-smoke:
    name: mabl — smoke (Preview)
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      MABL_API_TOKEN: ${{ secrets.MABL_API_TOKEN }}
      MABL_WORKSPACE_ID: ${{ secrets.MABL_WORKSPACE_ID }}
      MABL_APPLICATION_ID: ${{ secrets.MABL_APPLICATION_ID }}
      MABL_ENV_PREVIEW_ID: ${{ secrets.MABL_ENV_PREVIEW_ID }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y jq
      - name: trigger CSH-SMOKE against Preview
        run: |
          chmod +x scripts/mabl-deployment.sh
          ./scripts/mabl-deployment.sh \
            --environment "$MABL_ENV_PREVIEW_ID" \
            --application "$MABL_APPLICATION_ID" \
            --labels type-smk,exec-pr \
            --url "https://cheap-shot-hockey-git-${{ github.head_ref }}.vercel.app" \
            --commit "${{ github.sha }}" \
            --branch "${{ github.head_ref }}" \
            --wait

  post-deploy-smoke:
    name: post-deploy smoke (Prod)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      MABL_API_TOKEN: ${{ secrets.MABL_API_TOKEN }}
      MABL_APPLICATION_ID: ${{ secrets.MABL_APPLICATION_ID }}
      MABL_ENV_PROD_ID: ${{ secrets.MABL_ENV_PROD_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: wait for Vercel to reflect new commit
        run: |
          short="${GITHUB_SHA:0:7}"
          for i in $(seq 1 30); do
            live=$(curl -fsS ${{ env.PRODUCTION_URL }}/api/build-info | jq -r '.commit' | cut -c1-7)
            echo "live=$live expected=$short"
            [ "$live" = "$short" ] && exit 0
            sleep 10
          done
          echo "deploy never reflected new commit"; exit 1
      - run: sudo apt-get install -y jq
      - name: trigger CSH-SMOKE against Prod
        run: |
          chmod +x scripts/mabl-deployment.sh
          ./scripts/mabl-deployment.sh \
            --environment "$MABL_ENV_PROD_ID" \
            --application "$MABL_APPLICATION_ID" \
            --labels type-smk,exec-postdeploy \
            --url "${{ env.PRODUCTION_URL }}" \
            --commit "${{ github.sha }}" \
            --branch main \
            --wait

  # NOTE: the regression gate is intentionally not wired yet.
  # Re-add a `mabl-regression` job dispatching `type-rt,exec-nightly`
  # against Prod once the CSH-REGRESSION plan exists in mabl. Until
  # then, dispatching that label set wastes ~60s per main push with
  # zero matching plans.
