# CodeQL static analysis — GitHub-native security scanner.
# Runs on every PR + push to main, plus a weekly cron to catch new
# advisories against unchanged code. Uploads SARIF to the Security tab.
#
# Advisory in v1: not in the 5 required PR checks. Promote to required
# via branch protection once Vince has triaged any baseline findings.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:17 UTC — offset to avoid the on-the-hour stampede.
    - cron: "17 6 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use the security-extended query suite for tighter coverage.
          # `security-and-quality` adds maintainability rules but is
          # noisier — start with `security-extended` and tighten later.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
