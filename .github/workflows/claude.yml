name: Claude Code

# Responds when @claude is mentioned in issues, PR comments, or review
# comments. Uses anthropic/claude-code-action.
#
# Required secret:
#   ANTHROPIC_API_KEY  — your Claude API key (get one at console.anthropic.com)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Let Claude run npm/git inside sessions
          allowed_tools: "Bash,Edit,Read,Glob,Grep,WebFetch,WebSearch"
          # Tag the triggering comment so users know Claude saw it
          trigger_phrase: "@claude"
