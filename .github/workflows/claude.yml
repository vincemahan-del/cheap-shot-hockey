name: Claude Code

# Responds when @claude is mentioned in issues, PR comments, or review
# comments. Uses anthropics/claude-code-action.
#
# Auth — one of these secrets must be set:
#   CLAUDE_CODE_OAUTH_TOKEN  (preferred — uses your Claude Pro/Max/Team
#                            subscription; no separate API billing)
#     Create by running `/install-github-app` in Claude Code, OR
#     run `claude setup-token` in a terminal to mint one manually.
#   ANTHROPIC_API_KEY        (alternative — a console.anthropic.com key)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          settings: ".claude/settings.json"
          allowed_tools: "Bash,Edit,Write,Read,Glob,Grep,WebFetch,WebSearch,mcp__mabl__get_mabl_tests,mcp__mabl__plan_new_test,mcp__mabl__create_mabl_test_cloud,mcp__mabl__get_cloud_test_gen_status,mcp__mabl__analyze_failure,mcp__mabl__get_latest_plan_runs,mcp__mabl__get_latest_test_runs,mcp__mabl__run_mabl_test_cloud,mcp__atlassian__read_jira_issue,mcp__atlassian__create_jira_issue,mcp__atlassian__add_jira_comment,mcp__atlassian__search_jira_issues,mcp__atlassian__get_my_unresolved_issues"
          trigger_phrase: "@claude"
          mcp_config: |
            {
              "mcpServers": {
                "mabl": {
                  "command": "npx",
                  "args": ["--yes", "@mabl/mcp"],
                  "env": {
                    "MABL_API_KEY": "${{ secrets.MABL_API_TOKEN }}"
                  }
                },
                "atlassian": {
                  "command": "npx",
                  "args": ["--yes", "mcp-atlassian", "--transport", "stdio"],
                  "env": {
                    "JIRA_URL": "https://mabl.atlassian.net",
                    "JIRA_USERNAME": "${{ secrets.JIRA_USER_EMAIL }}",
                    "JIRA_API_TOKEN": "${{ secrets.JIRA_API_TOKEN }}"
                  }
                }
              }
            }
